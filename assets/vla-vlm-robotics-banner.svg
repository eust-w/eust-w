  <rect width="1280" height="420" rx="28" fill="url(#grid)"/>
  <rect width="1280" height="420" rx="28" fill="url(#scan)"/>

  <path d="M106 334C238 270 338 278 480 318C640 363 796 357 930 294C1028 248 1112 232 1190 258" stroke="url(#cyan)" stroke-opacity="0.38" stroke-width="2"/>
