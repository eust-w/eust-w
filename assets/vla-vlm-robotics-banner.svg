<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VLA VLM Robotics Banner</title>
  <desc id="desc">A futuristic robotics and embodied AI banner with simulation grids, neural circuits, and robot brain architecture.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070A13"/>
      <stop offset="0.45" stop-color="#0D1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="240" y1="42" x2="1040" y2="378" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="panel" x1="160" y1="78" x2="1120" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.78"/>
    </linearGradient>
    <radialGradient id="scan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 214) rotate(90) scale(220 600)">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="0.65" stop-color="#7C3AED" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.06 0 0 0 0 0.85 0 0 0 0 1 0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
      <path d="M12 0V48M24 0V48M36 0V48M0 12H48M0 24H48M0 36H48" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>

